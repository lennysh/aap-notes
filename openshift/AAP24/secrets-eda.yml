---
# 1. External PostgreSQL connection secret (EDA)
apiVersion: v1
kind: Secret
metadata:
  name: eda-postgres-configuration
  namespace: aap
stringData:
  host: "db.external.example.com"
  port: "5432"
  database: "eda"
  username: "eda_db_user"
  password: "SecurePassword123" # notsecret
  sslmode: "prefer"
  type: "unmanaged"
type: Opaque

---
# 2. EDA database field encryption key (name follows <resourcename>-secret-key; data key is secret_key)
apiVersion: v1
kind: Secret
metadata:
  name: example-eda-secret-key
  namespace: aap
stringData:
  secret_key: "your-eda-encryption-key-here" # notsecret
type: Opaque

---
# 3. EDA admin password (optional; operator auto-generates if omitted)
apiVersion: v1
kind: Secret
metadata:
  name: example-eda-admin-password
  namespace: aap
stringData:
  password: "AdminPassword123" # notsecret
type: Opaque

---
# 4. EDA Route TLS (replace PEM placeholders or use: oc create secret tls eda-route-tls-secret --cert=tls.crt --key=tls.key -n aap)
apiVersion: v1
kind: Secret
metadata:
  name: eda-route-tls-secret
  namespace: aap
type: kubernetes.io/tls
stringData:
  tls.crt: | # notsecret
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_EDA_CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: | # notsecret
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_EDA_PRIVATE_KEY
    -----END PRIVATE KEY-----

---
# --- Optional secrets below: uncomment the block(s) you need AND the matching fields in eda.yml ---

