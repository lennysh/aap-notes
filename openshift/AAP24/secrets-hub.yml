---
# 1. External PostgreSQL connection secret (Hub)
apiVersion: v1
kind: Secret
metadata:
  name: hub-postgres-configuration
  namespace: aap
stringData:
  host: "db.external.example.com"
  port: "5432"
  database: "automationhub"
  username: "hub_db_user"
  password: "SecurePassword123" # notsecret
  sslmode: "prefer"
  type: "unmanaged"
type: Opaque

---
# 2. Hub database field encryption key (name follows <resourcename>-secret-key)
apiVersion: v1
kind: Secret
metadata:
  name: example-hub-secret-key
  namespace: aap
stringData:
  database_fields.symmetric.key: "your-hub-symmetric-encryption-key-here" # notsecret
type: Opaque

---
# 3. Hub Route TLS (replace PEM placeholders or use: oc create secret tls hub-route-tls-secret --cert=tls.crt --key=tls.key -n aap)
apiVersion: v1
kind: Secret
metadata:
  name: hub-route-tls-secret
  namespace: aap
type: kubernetes.io/tls
stringData:
  tls.crt: | # notsecret
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_HUB_CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: | # notsecret
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_HUB_PRIVATE_KEY
    -----END PRIVATE KEY-----

---
# 4. Automation Hub object storage — Amazon S3
apiVersion: v1
kind: Secret
metadata:
  name: hub-s3-storage-secret
  namespace: aap
stringData:
  s3-access-key-id: "YOUR_AWS_ACCESS_KEY_ID" # notsecret
  s3-secret-access-key: "YOUR_AWS_SECRET_ACCESS_KEY" # notsecret
  s3-bucket-name: "your-s3-bucket-name"
  s3-region: "us-east-1"
type: Opaque

