---
# AAP 2.7 optional variables — YAML-only (lists and dictionaries)
#
# Scalar options belong in the inventory file (see inventory-example or
# inventory-growth-example). This file covers complex types that do not
# work well in INI inventory syntax.
#
# Usage:
#   1. Copy this file to vars.yml (or merge into group_vars/all.yml)
#   2. Uncomment and edit the variables you need
#   3. Run: ansible-playbook -i inventory ansible.containerized_installer.install -e @vars.yml
#
# Regenerate from catalog: python3 scripts/build_inventory.py --version 2.7


# Common / installer-wide
# -----------------------------------------------------

# Dictionary of feature flags (keys must start with feature_, values boolean)
# feature_flags:
#   feature_example_flag: true

# Host tuning
# -----------------------------------------------------

# Container images
# -----------------------------------------------------

# Additional Decision Environment images to upload to Hub; list
# de_extra_images:
#   - name: my-custom-de
#     image: registry.example.org/my-ee:latest

# Additional Execution Environment images to upload to Hub; list
# ee_extra_images:
#   - name: my-custom-ee
#     image: registry.example.org/my-ee:latest

# PostgreSQL / managed database
# -----------------------------------------------------

# Extra postgresql.conf settings as list of setting/value dicts
# postgresql_extra_settings:
#   - setting: ssl_ciphers
#     value: 'HIGH:!aNULL:!MD5'

# Redis
# -----------------------------------------------------

# Receptor
# -----------------------------------------------------

# Additional Receptor peer definitions; list
