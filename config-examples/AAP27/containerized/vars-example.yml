# Log gathering (ansible.containerized_installer.log_gathering playbook)
# -----------------------------------------------------

# AAP Gateway
# -----------------------------------------------------

# Extra Gateway Django settings as list of setting/value dicts
# gateway_extra_settings:
#   - setting: OAUTH2_PROVIDER['ACCESS_TOKEN_EXPIRE_SECONDS']
#     value: true

# Gateway nginx SSL protocols; list
# gateway_nginx_https_protocols:
#   - TLSv1.2
#   - TLSv1.3

# Custom nginx headers; list
# gateway_nginx_user_headers:
#   - 'X-Custom-Header "value"'

# AAP Controller
# -----------------------------------------------------

# Extra Controller settings as list of setting/value dicts
# controller_extra_settings:
#   - setting: USE_X_FORWARDED_HOST
#     value: true

# Controller nginx SSL protocols; list
# controller_nginx_https_protocols:
#   - TLSv1.2
#   - TLSv1.3

# Custom Controller nginx headers; list
# controller_nginx_user_headers:
#   - 'X-Custom-Header "value"'

# Files to skip during Controller postinstall; list
# controller_postinstall_ignore_files:
#   - example-entry

# Metrics Utility extra settings; list
# metrics_utility_extra_settings:
#   - setting: SOME_METRICS_SETTING
#     value: true

# AAP Automation Hub
# -----------------------------------------------------

# Extra Hub settings as list of setting/value dicts
# hub_extra_settings:
#   - setting: REDIRECT_IS_HTTPS
#     value: true

# Paths excluded from Hub backup; list
# hub_data_path_exclude:
#   - example-entry

# Galaxy importer configuration dictionary
# hub_galaxy_importer:
#   ansible_test_local_image: false

# Hub nginx SSL protocols; list
# hub_nginx_https_protocols:
#   - TLSv1.2
#   - TLSv1.3

# Custom Hub nginx headers; list
# hub_nginx_user_headers:
#   - 'X-Custom-Header "value"'

# Files to skip during Hub postinstall; list
# hub_postinstall_ignore_files:
#   - example-entry

