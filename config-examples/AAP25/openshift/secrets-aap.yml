---
# 1. Platform gateway PostgreSQL (optional — operator creates managed DB if omitted)
apiVersion: v1
kind: Secret
metadata:
  name: aap-gateway-postgres-configuration
  namespace: aap
stringData:
  host: "db.external.example.com"
  port: "5432"
  database: "aap_gateway"
  username: "aap_gateway_user"
  password: "SecurePassword123" # notsecret
  sslmode: "prefer"
  type: "unmanaged"
type: Opaque

---
# 2. Platform DB fields encryption key (gateway / platform services)
apiVersion: v1
kind: Secret
metadata:
  name: example-aap-secret-key
  namespace: aap
stringData:
  secret_key: "your-platform-encryption-key-here" # notsecret
type: Opaque

---
# 3. Platform admin password (gateway unified login)
apiVersion: v1
kind: Secret
metadata:
  name: example-aap-admin-password
  namespace: aap
stringData:
  password: "AdminPassword123" # notsecret
type: Opaque

---
# 4. Platform Route TLS (single entry point for gateway in 2.5+)
apiVersion: v1
kind: Secret
metadata:
  name: aap-route-tls-secret
  namespace: aap
type: kubernetes.io/tls
stringData:
  tls.crt: | # notsecret
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_AAP_GATEWAY_CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: | # notsecret
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_AAP_GATEWAY_PRIVATE_KEY
    -----END PRIVATE KEY-----

---
# 5. Hub object storage — referenced from spec.hub.object_storage_s3_secret in aap.yml
apiVersion: v1
kind: Secret
metadata:
  name: hub-s3-storage-secret
  namespace: aap
stringData:
  s3-access-key-id: "YOUR_AWS_ACCESS_KEY_ID" # notsecret
  s3-secret-access-key: "YOUR_AWS_SECRET_ACCESS_KEY" # notsecret
  s3-bucket-name: "your-s3-bucket-name"
  s3-region: "us-east-1"
type: Opaque

---
