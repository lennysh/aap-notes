# AAP 2.5 RPM installer optional variables — YAML-only (lists and dictionaries)
#
# Copy to vars.yml and pass: ./setup.sh -e @vars.yml
# Regenerate: python3 scripts/build_rpm_inventory.py --version 2.5


# Bundle / offline install
# -----------------------------------------------------

# Package versions
# -----------------------------------------------------

# Automation Controller
# -----------------------------------------------------

# Controller nginx TLS protocols; list — use vars.yml
# nginx_tls_protocols:
#   - example-entry

# Custom Controller nginx headers; list — use vars.yml
# nginx_user_headers:
#   - example-entry

# Receptor / execution
# -----------------------------------------------------

# Certificate authority
# -----------------------------------------------------

# Extra SAN records for component certs; list — use vars.yml
# aap_service_san_records:
#   - example-entry

# Automation Hub (extra)
# -----------------------------------------------------

# Custom Hub nginx headers; list — use vars.yml
# automationhub_user_headers:
#   - example-entry

# Extra LDAP settings dictionary; use vars.yml
# ldap_extra_settings:
#   AUTH_LDAP_USER_FLAGS_BY_GROUP: {}

# Automation EDA Controller (extra)
# -----------------------------------------------------

# Custom EDA nginx headers; list — use vars.yml
# automationedacontroller_user_headers:
#   - example-entry

# Extra allowed hostnames for EDA; list — use vars.yml
# automationedacontroller_allowed_hostnames:
#   - example-entry

# Trusted CSRF origins; list — use vars.yml
# automationedacontroller_trusted_origins:
#   - example-entry

# Allowlisted EDA rulebook plugins; list — use vars.yml
# automationedacontroller_safe_plugins:
#   - example-entry

# Decision environments to configure in EDA; list — use vars.yml
# decision_environments:
