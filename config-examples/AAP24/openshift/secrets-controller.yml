---
# 1. External PostgreSQL connection secret (Controller)
apiVersion: v1
kind: Secret
metadata:
  name: controller-postgres-configuration
  namespace: aap
stringData:
  host: "db.external.example.com"
  port: "5432"
  database: "awx"
  username: "awx_db_user"
  password: "SecurePassword123" # notsecret
  sslmode: "prefer"
  type: "unmanaged"
type: Opaque

---
# 2. Execution Environment (EE) registry pull credentials
apiVersion: v1
kind: Secret
metadata:
  name: ee-pull-secret
  namespace: aap
stringData:
  username: "registry_user"
  password: "registry_password" # notsecret
  url: "registry.redhat.io"
type: Opaque

---
# 3. Controller secret key (Django SECRET_KEY — name follows <resourcename>-secret-key)
apiVersion: v1
kind: Secret
metadata:
  name: example-controller-secret-key
  namespace: aap
stringData:
  secret_key: "your-controller-encryption-key-here" # notsecret
type: Opaque

---
# 4. Controller admin password (optional; operator auto-generates if omitted)
apiVersion: v1
kind: Secret
metadata:
  name: example-controller-admin-password
  namespace: aap
stringData:
  password: "AdminPassword123" # notsecret
type: Opaque

---
# 5. Controller Route TLS (replace PEM placeholders or use: oc create secret tls controller-route-tls-secret --cert=tls.crt --key=tls.key -n aap)
apiVersion: v1
kind: Secret
metadata:
  name: controller-route-tls-secret
  namespace: aap
type: kubernetes.io/tls
stringData:
  tls.crt: | # notsecret
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_CONTROLLER_CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: | # notsecret
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_CONTROLLER_PRIVATE_KEY
    -----END PRIVATE KEY-----

---
# --- Optional secrets below: uncomment the block(s) you need AND the matching fields in controller.yml ---

