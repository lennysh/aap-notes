---
# Automation Hub Custom Resource
apiVersion: automationhub.ansible.com/v1beta1
kind: AutomationHub
metadata:
  name: example-hub
  namespace: aap
spec:
  replicas: 1

  # Core secret references
  db_fields_encryption_secret: example-hub-secret-key # notsecret
  postgres_configuration_secret: hub-postgres-configuration # notsecret

  # Optional: private Hub + Red Hat SSO / Keycloak (uncomment secret in secrets-hub.yml + field below)
  # sso_secret: automation-hub-sso # notsecret

  # Object storage — enable ONE backend in secrets-hub.yml and the matching field here
  object_storage_s3_secret: hub-s3-storage-secret # notsecret
  # object_storage_azure_secret: hub-azure-storage-secret # notsecret

  ingress_type: Route
  route_tls_termination_mechanism: Edge
  route_tls_secret: hub-route-tls-secret # notsecret
