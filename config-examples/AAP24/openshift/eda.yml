---
# EDA Custom Resource — exhaustive spec example
# Derived from CRD: eda.ansible.com_edas.yaml
# Fields with CRD defaults are set explicitly; unset options are commented with placeholders.
apiVersion: eda.ansible.com/v1beta1
kind: EDA
metadata:
  name: example-eda
  namespace: aap
spec:

  # --- Admin & account ---
  admin_user: "admin"  # default; Username to use for the admin account
  admin_password_secret: "example-eda-admin-password" # notsecret  # Secret where the admin password can be found. If not specified, one will be generated.

  # --- Operator behavior ---
  no_log: true  # default; Configure no_log for no log tasks
  set_self_labels: true  # default; Maintain some of the recommended `app.kubernetes.io/*` labels on the resource (self)
  force_drop_db: false  # default; Force drop the database before restoring. USE WITH CAUTION!
  # idle_deployment: false  # Scale down deployments to put EDA into an idle state (Only effective for 2.5+)
  # ui_disabled: false  # Disable the UI for a headless EDA deployment (only API endpoints) (Only effective for 2.5+
  ipv6_disabled: false  # default; Disable UI container's nginx ipv6 listener
  public_base_url: ""  # default; Public base URL (Only effective for 2.5+)

  # --- Secrets & encryption ---
  db_fields_encryption_secret: "example-eda-secret-key" # notsecret  # Secret where the DB fields encryption key can be found. If not specified, one will be gene
  # bundle_cacert_secret: example-value # notsecret  # Secret where the trusted Certificate Authority Bundle is stored

  # --- Controller integration ---
  automation_server_url: "https://example-controller-aap.apps.example.com"  # URL of the Automation Controller instance to run ansible jobs against
  # automation_server_ssl_verify: example-value  # SSL Verify (yes, no) for the Automation Controller instance

  # --- Database ---
  database:
    database_secret: "eda-postgres-configuration" # notsecret  # Secret where the database configuration can be found. Set this to us your own external Pos
    # node_selector: {}  # NodeSelector for the database pod.
    # postgres_data_path: example-value  # Registry path to the PostgreSQL container to use. Default: "/var/lib/pgsql/data/userdata"
    # postgres_extra_args: []  # Arguments to pass to postgres process
    postgres_keep_pvc_after_upgrade: true  # default; Specify whether or not to keep the old PVC after PostgreSQL upgrades (Only effective for 2
    # postgres_ssl_mode: example-value  # Configure PostgreSQL connection sslmode option. Default: "prefer"
    # postgres_storage_class: example-value  # Storage class to use for the PostgreSQL PVC
    # priority_class: example-value  # Assign a pre-existing priority class to the postgres pod
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    storage_requirements:
      limits:
        # storage: example-value
      requests:
        # storage: example-value
    # tolerations: []  # Node tolerations for the database pod.

  # --- Redis ---
  redis:
    # node_selector: {}  # NodeSelector for the EDA pods.
    # redis_secret: example-value # notsecret  # Secret where the redis configuration can be found. Set this to us your own external Redis 
    replicas: 1  # default; Defines Redis Deployment replicas
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
  # redis_image: example-value  # Registry path to Redis container image to use
  # redis_image_version: example-value  # Redis container image tag or version to use

  # --- Container images ---
  # image: example-value  # Registry path to API container image to use
  # image_version: example-value  # API container image tag or version to use
  # image_web: example-value  # Registry path to UI container image to use
  # image_web_version: example-value  # UI container image tag or version to use
  image_pull_policy: "IfNotPresent"  # default; The image pull policy; enum: Always, always, Never, never, IfNotPresent, ifnotpresent
  # image_pull_secrets: []  # Image pull secrets for app and database containers
  # postgres_image: example-value  # Registry path to the PostgreSQL container to use
  # postgres_image_version: example-value  # PostgreSQL container image version to use

  # --- Ingress / Route / LoadBalancer ---
  ingress_type: "Route"  # default; The ingress type to use to reach the deployed instance; enum: None, none, Ingress, ingress, Route, route
  # ingress_api_version: example-value  # The Ingress API version to use
  # ingress_class_name: example-value  # The name of ingress class to use instead of the cluster default.
  # ingress_path: example-value  # The ingress path used to reach the deployed service
  # ingress_path_type: example-value  # The ingress path type for the deployed service
  # ingress_annotations: example-value  # Annotations to add to the Ingress Controller
  # ingress_tls_secret: example-value # notsecret  # Secret where the Ingress TLS secret can be found
  # route_api_version: example-value  # The route API version to use
  # route_host: example-value  # The DNS to use to points to the instance
  route_tls_secret: "eda-route-tls-secret" # notsecret  # Secret where the TLS related credentials are stored
  route_tls_termination_mechanism: "Edge"  # default; The secure TLS termination mechanism to use; enum: Edge, edge, Passthrough, passthrough
  loadbalancer_port: 80  # default; Port to use for the loadbalancer
  loadbalancer_protocol: "http"  # default; Protocol to use for the loadbalancer; enum: http, https
  # nodeport_port: 0  # Port to use for the nodeport
  # service_type: example-value  # The service type to be used on the deployed instance; enum: LoadBalancer, loadbalancer, ClusterIP, clusterip, NodePort, nodeport
  # hostname: example-value  # The hostname of the instance

  # --- API deployment ---
  api:
    gunicorn_workers: 2  # default; The number of gunicorn workers for the api. Default: 2
    # node_selector: {}  # NodeSelector for the EDA pods.
    replicas: 1  # default; Size is the size of number of eda-api replicas. Default: 1
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
    # topology_spread_constraints: []  # Topology rule(s) for the pods.

  # --- UI deployment ---
  ui:
    # node_selector: {}  # NodeSelector for the EDA pods.
    replicas: 1  # default; Size is the size of number of eda-ui replicas. Default: 1
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
    # topology_spread_constraints: []  # Topology rule(s) for the pods.

  # --- Scheduler deployment ---
  scheduler:
    # node_selector: {}  # NodeSelector for the EDA pods.
    replicas: 1  # default; Size is the size of number of eda-scheduler replicas. Default: 1
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
    # topology_spread_constraints: []  # Topology rule(s) for the pods.

  # --- Worker deployments ---
  worker:
    # node_selector: {}  # NodeSelector for the EDA pods.
    replicas: 2  # default; Size is the size of number of eda-worker replicas. Default: 1
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
    # topology_spread_constraints: []  # Topology rule(s) for the pods.
  default_worker:
    # node_selector: {}  # NodeSelector for the EDA pods.
    replicas: 2  # default; Size is the size of number of eda-default-worker replicas. Default: 1
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
    # topology_spread_constraints: []  # Topology rule(s) for the pods.
  activation_worker:
    # node_selector: {}  # NodeSelector for the EDA pods.
    replicas: 5  # default; Size is the size of number of eda-activation-worker replicas. Default: 5
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
    # topology_spread_constraints: []  # Topology rule(s) for the pods.

  # --- Event stream deployment ---
  event_stream:
    gunicorn_workers: 2  # default; The number of gunicorn workers for the api. Default: 2
    # node_selector: {}  # NodeSelector for the EDA pods.
    # prefix: example-value  # Prefix for the Event Stream URL
    replicas: 1  # default; Size is the size of number of eda-worker replicas. Default: 1
    resource_requirements:
      # claims: []  # Claims lists the names of resources, defined in spec.resourceClaims, that are used by this
      # limits: {}  # Limits describes the maximum amount of compute resources allowed. More info: https://kuber
      # requests: {}  # Requests describes the minimum amount of compute resources required. If Requests is omitte
    strategy:
      # rollingUpdate: {}  # Rolling update config params. Present only if DeploymentStrategyType = RollingUpdate. --- 
      # type: example-value  # Type of deployment. Can be "Recreate" or "RollingUpdate". Default is RollingUpdate.
    # tolerations: []  # Node tolerations for the EDA pods.
    # topology_spread_constraints: []  # Topology rule(s) for the pods.

  # --- Scheduling & labels ---
